{% extends "base.html" %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%; border-radius: 12px; background-color: #212529; color: white;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">🔒 Acceso Administrador</h3>
            <p class="text-muted">Ingresa la contraseña maestra</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger p-2 text-center fs-6">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña Admin:</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-secondary" placeholder="Escribe aquí..." required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold">Entrar al Panel</button>
        </form>
    </div>
</div>
{% endblock %}
